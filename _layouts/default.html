<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,max-scale=1">
    <title>{{ page.title | default: site.title | default: "Page Title" }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <header>
      <h1>{{ site.title | default: "Project Title" }}</h1>
      <p>{{ site.description | default: "Project description" }}</p>
    </header>

    <div id="content-wrapper">
      <main id="main" class="inner">
        {{ content }}
      </main>
    </div>

    <footer>
      <p>This project is maintained by <a href="{{ site.github.owner_url }}">{{ site.github.owner_name }}</a></p>
    </footer>
  </body>
</html>
